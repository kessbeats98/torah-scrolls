<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תיקי תורה יוקרתיים</title>
    <!-- ייבוא פונט גוגל -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- ייבוא ספריית הקונפטי -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --gold-light: #d4b581;
            --gold-dark: #a8854b;
            --gold-accent: #f4d03f;
            --bg-dark: #0a0a0c;
            --bg-secondary: #121214;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(212, 181, 129, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(255, 255, 255, 0.04) 0%, transparent 45%);
            color: var(--gold-light);
            height: 100vh;
            width: 100vw;
            max-width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            justify-content: flex-start;
            align-items: center;
            position: relative;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(180deg, transparent 0%, rgba(10, 10, 12, 0.8) 100%),
                linear-gradient(0deg, transparent 0%, rgba(10, 10, 12, 0.6) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* אזור הכותרת */
        .header {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 8px;
            z-index: 10;
            position: relative;
        }

        .header h1 {
            font-size: clamp(20px, 5vw, 24px);
            font-weight: 400;
            margin: 0;
            line-height: 1.3;
            letter-spacing: 0.3px;
            color: var(--text-primary);
        }

        .header h1 span {
            font-size: clamp(24px, 6vw, 28px);
            font-weight: 600;
            color: var(--gold-light);
            display: inline-block;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        /* אזור הקרוסלה */
        .carousel-container {
            position: relative;
            height: clamp(650px, 85vh, 900px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            max-width: 800px;
            margin: -20px auto 0;
            z-index: 5;
            perspective: 1000px;
            padding-top: 10px;
        }

        @media (max-width: 768px) {
            .carousel-container {
                align-items: center;
                margin: -40px auto 0;
                padding-top: 0;
                height: clamp(480px, 65vh, 650px);
            }
            .header {
                margin-top: 5px;
                margin-bottom: 2px;
            }
            .info-section {
                margin-top: -100px;
                padding: 0 20px 20px;
            }
        }

        .carousel-item {
            position: absolute;
            width: clamp(280px, 60vw, 440px);
            height: clamp(600px, 90vh, 800px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            transform-style: preserve-3d;
            will-change: transform, opacity;
        }

        /* אפקט הזכוכית */
        .glass-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            border-radius: 20px;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            z-index: 1;
            transition: all 0.5s ease;
            box-shadow: none;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 2;
            filter: none;
            pointer-events: none;
            transition: filter 0.6s ease;
        }

        .carousel-item:hover img {
            filter: none;
        }

        .carousel-item[data-pos="0"] {
            transform: translateX(0) scale(1.35) translateZ(80px);
            z-index: 3;
            opacity: 1;
        }
        .carousel-item[data-pos="0"] .glass-bg {
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .carousel-item[data-pos="1"] {
            transform: translateX(-180px) scale(0.55) translateZ(-150px);
            z-index: 2;
            opacity: 0.15;
            filter: blur(6px) grayscale(0.4);
        }

        .carousel-item[data-pos="-1"] {
            transform: translateX(180px) scale(0.55) translateZ(-150px);
            z-index: 2;
            opacity: 0.15;
            filter: blur(6px) grayscale(0.4);
        }

        /* אזור הטקסט והכפתור בתחתית */
        .info-section {
            text-align: center;
            margin-top: 10px;
            padding: 0 20px 10px;
            z-index: 10;
            position: relative;
        }

        .info-title {
            font-size: clamp(18px, 4vw, 22px);
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 6px 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            letter-spacing: 0.2px;
        }

        .info-desc {
            font-size: clamp(13px, 3vw, 15px);
            color: var(--text-secondary);
            margin: 0 0 20px 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            line-height: 1.4;
        }

        .cta-btn {
            background: rgba(212, 181, 129, 0.15);
            border: 1px solid var(--gold-light);
            color: var(--gold-light);
            padding: 12px 36px;
            font-size: clamp(14px, 3vw, 16px);
            border-radius: 25px;
            font-family: inherit;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(212, 181, 129, 0.15);
            position: relative;
        }

        .cta-btn:hover {
            background: rgba(212, 181, 129, 0.25);
            box-shadow: 0 4px 15px rgba(212, 181, 129, 0.25);
            transform: translateY(-2px);
        }

        .cta-btn:active {
            transform: translateY(0);
        }

        .cta-btn i {
            font-size: clamp(11px, 2.5vw, 13px);
            font-style: normal;
        }

        @media (max-width: 768px) {
            .carousel-item[data-pos="1"] { transform: translateX(-80px) scale(0.5) translateZ(-120px); opacity: 0.12; filter: blur(5px) grayscale(0.4); }
            .carousel-item[data-pos="-1"] { transform: translateX(80px) scale(0.5) translateZ(-120px); opacity: 0.12; filter: blur(5px) grayscale(0.4); }
            .carousel-item[data-pos="0"] { transform: translateX(0) scale(1.25) translateZ(50px); }
            .header { margin-top: 15px; margin-bottom: 10px; }
        }

        @media (max-width: 480px) {
            .carousel-item[data-pos="1"] { transform: translateX(-60px) scale(0.45) translateZ(-100px); opacity: 0.1; filter: blur(4px) grayscale(0.4); }
            .carousel-item[data-pos="-1"] { transform: translateX(60px) scale(0.45) translateZ(-100px); opacity: 0.1; filter: blur(4px) grayscale(0.4); }
            .carousel-item[data-pos="0"] { transform: translateX(0) scale(1.2) translateZ(40px); }
        }

        @media (max-width: 360px) {
            .carousel-item[data-pos="1"] { transform: translateX(-45px) scale(0.4) translateZ(-80px); opacity: 0.08; filter: blur(4px) grayscale(0.4); }
            .carousel-item[data-pos="-1"] { transform: translateX(45px) scale(0.4) translateZ(-80px); opacity: 0.08; filter: blur(4px) grayscale(0.4); }
            .carousel-item[data-pos="0"] { transform: translateX(0) scale(1.15) translateZ(30px); }
        }

        /* תפריט ניווט תחתון */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(18, 18, 20, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 10px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .nav-item.active {
            color: var(--gold-light);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>תיקי תורה יוקרתיים -<br><span>פרספקטיבה גדולה</span></h1>
    </div>

    <div class="carousel-container">
        <div class="carousel-item" data-title="תיק כסף טהור" data-desc="עיצוב מסורתי עם עיטורים מכסף טהור" onclick="moveTo(0)">
            <div class="glass-bg"></div>
            <img src="9wcgm_RXtx-Photoroom.png" alt="תיק כסף">
        </div>
        
        <div class="carousel-item" data-title="תיק תורה ורד זהב" data-desc="דגם מלכותי משובץ באבני חן" onclick="moveTo(1)">
            <div class="glass-bg"></div>
            <img src="DGC-jIVJzT-Photoroom.png" alt="תיק ורד זהב">
        </div>
        
        <div class="carousel-item" data-title="תיק זהב קלאסי" data-desc="פאר והדר עם לוחות הברית מזהב" onclick="moveTo(2)">
            <div class="glass-bg"></div>
            <img src="image (3).png" alt="תיק זהב">
        </div>
    </div>

    <div class="info-section">
        <h2 class="info-title" id="display-title">תיק תורה ורד זהב</h2>
        <p class="info-desc" id="display-desc">דגם מלכותי משובץ באבני חן</p>
        
        <!-- הוספתי ID לכפתור כדי שנוכל לזהות את הלחיצה עליו בקוד -->
        <button class="cta-btn" id="discover-btn">
            לגלות עוד <i>&lt;</i>
        </button>
    </div>

    <script>
        const items = document.querySelectorAll('.carousel-item');
        const displayTitle = document.getElementById('display-title');
        const displayDesc = document.getElementById('display-desc');
        const discoverBtn = document.getElementById('discover-btn');
        
        let currentIndex = 1;

        function updateCarousel() {
            items.forEach((item, index) => {
                let diff = index - currentIndex;
                
                if (diff === 2) diff = -1;
                if (diff === -2) diff = 1;

                item.setAttribute('data-pos', diff);

                if (diff === 0) {
                    displayTitle.style.opacity = 0;
                    displayTitle.style.transform = 'translateY(8px)';
                    displayDesc.style.opacity = 0;
                    displayDesc.style.transform = 'translateY(8px)';
                    
                    setTimeout(() => {
                        displayTitle.innerText = item.getAttribute('data-title');
                        displayDesc.innerText = item.getAttribute('data-desc');
                        displayTitle.style.opacity = 1;
                        displayTitle.style.transform = 'translateY(0)';
                        displayDesc.style.opacity = 1;
                        displayDesc.style.transform = 'translateY(0)';
                    }, 200);
                }
            });
        }

        function moveTo(index) {
            currentIndex = index;
            updateCarousel();
        }

        // --- החלקת אצבע למובייל ועכבר למחשב ---
        let touchStartX = 0;
        let touchEndX = 0;
        let mouseStartX = 0;
        let mouseEndX = 0;
        let isMouseDown = false;
        const carouselContainer = document.querySelector('.carousel-container');

        // Touch events for mobile
        carouselContainer.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        carouselContainer.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        // Mouse events for desktop
        carouselContainer.addEventListener('mousedown', e => {
            mouseStartX = e.clientX;
            isMouseDown = true;
            carouselContainer.style.cursor = 'grabbing';
        });

        carouselContainer.addEventListener('mouseup', e => {
            if (isMouseDown) {
                mouseEndX = e.clientX;
                handleMouseSwipe();
                isMouseDown = false;
                carouselContainer.style.cursor = 'default';
            }
        });

        carouselContainer.addEventListener('mouseleave', e => {
            if (isMouseDown) {
                isMouseDown = false;
                carouselContainer.style.cursor = 'default';
            }
        });

        carouselContainer.addEventListener('mousemove', e => {
            if (isMouseDown) {
                mouseEndX = e.clientX;
            }
        });

        function handleSwipe() {
            const threshold = 50; 
            if (touchEndX < touchStartX - threshold) {
                currentIndex = (currentIndex + 1) % 3;
                updateCarousel();
            }
            if (touchEndX > touchStartX + threshold) {
                currentIndex = (currentIndex - 1 + 3) % 3;
                updateCarousel();
            }
        }

        function handleMouseSwipe() {
            const threshold = 50;
            const diff = mouseEndX - mouseStartX;
            if (Math.abs(diff) > threshold) {
                if (diff < 0) {
                    currentIndex = (currentIndex + 1) % 3;
                } else {
                    currentIndex = (currentIndex - 1 + 3) % 3;
                }
                updateCarousel();
            }
        }

        // --- אפקט הקונפטי ---
        discoverBtn.addEventListener('click', function(e) {
            // בחירת צבעים יוקרתיים שיתאימו לאתר (זהב, כסף, ורד-זהב, ולבן)
            const elegantColors =['#d4b581', '#a8854b', '#e0e0e0', '#b76e79', '#ffffff'];

            // קבלת המיקום המדויק של הכפתור כדי שהקונפטי יעוף ממנו
            const rect = e.target.getBoundingClientRect();
            const x = (rect.left + (rect.width / 2)) / window.innerWidth;
            const y = (rect.top + (rect.height / 2)) / window.innerHeight;

            // הפעלת הקונפטי מתוך המיקום של הכפתור
            confetti({
                particleCount: 120,    // כמות החלקיקים
                spread: 80,            // זווית הפיזור
                origin: { x: x, y: y }, // מאיפה זה מתחיל (אמצע הכפתור)
                colors: elegantColors, // הצבעים שהגדרנו
                zIndex: 9999,          // שיהיה מעל הכל
                disableForReducedMotion: true
            });
        });

        // אתחול הקרוסלה בטעינה
        updateCarousel();
    </script>
</body>
</html>
